name: qualitydoc-apps
services:

  # ── PHP Portal ───────────────────────────────────────────────────────────────
  php-portal:
    build:
      context: ./php-portal
      dockerfile: Dockerfile
    container_name: qualitydoc_php
    restart: unless-stopped
    networks:
      - qualitydoc_net
    environment:
      PG_USER:     "${PG_USER:-qualitydoc}"
      PG_PASSWORD: "${PG_PASSWORD:-QualityDoc_PG_2026!}"
    ports:
      - "8080:80"

# ── Red compartida (creada por docker-compose.infra.yml) ──────────────────────
networks:
  qualitydoc_net:
    name: qualitydoc_net
    external: true
