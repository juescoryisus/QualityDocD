services:
  # ── SQL Server 2022 ──────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: qualitydoc_sqlserver
    restart: unless-stopped
    networks:
      - qualitydoc_net
    environment:
      ACCEPT_EULA:       "Y"
      SA_PASSWORD:       "${SQLSERVER_SA_PASSWORD:-QualityDoc2026!}"
      MSSQL_PID:         "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      # Scripts SQL de seed (solo se ejecutan manualmente con sqlcmd)
      - ./db/sql:/docker-entrypoint-sql:ro
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${SQLSERVER_SA_PASSWORD:-QualityDoc2026!}' -Q 'SELECT 1' -No -C"]
      interval: 15s
      timeout:  10s
      retries:  8
      start_period: 30s

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: qualitydoc_postgres
    restart: unless-stopped
    networks:
      - qualitydoc_net
    environment:
      POSTGRES_DB:       "${PG_DB:-qualitydoc_audit}"
      POSTGRES_USER:     "${PG_USER:-qualitydoc}"
      POSTGRES_PASSWORD: "${PG_PASSWORD:-QualityDoc_PG_2026!}"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # El seed de PostgreSQL se monta para ejecución manual
      - ./db/sql:/docker-entrypoint-sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-qualitydoc} -d ${PG_DB:-qualitydoc_audit}"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 10s

  # ── MongoDB 7 ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: qualitydoc_mongodb
    restart: unless-stopped
    networks:
      - qualitydoc_net
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_USER:-mongoadmin}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_PASSWORD:-QualityDoc_Mongo_2026!}"
      MONGO_INITDB_DATABASE:      "${MONGO_DB:-qualitydoc_meta}"
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./db/mongodb/init.js:/docker-entrypoint-initdb.d/01_init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 15s
      timeout:  10s
      retries:  5
      start_period: 20s

  # ── Node.js Search Service ────────────────────────────────────────────────────
  search-service:
    build:
      context: ./search-service
      dockerfile: Dockerfile
    container_name: qualitydoc_search
    restart: unless-stopped
    networks:
      - qualitydoc_net
    environment:
      PORT:           "3001"
      MONGO_HOST:     "mongodb"
      MONGO_USER:     "${MONGO_USER:-mongoadmin}"
      MONGO_PASSWORD: "${MONGO_PASSWORD:-QualityDoc_Mongo_2026!}"
      MONGO_DB:       "${MONGO_DB:-qualitydoc_meta}"
    ports:
      - "3001:3001"
    depends_on:
      mongodb:
        condition: service_healthy

  # ── PHP Portal ───────────────────────────────────────────────────────────────
  php-portal:
    build:
      context: ./php-portal
      dockerfile: Dockerfile
    container_name: qualitydoc_php
    restart: unless-stopped
    networks:
      - qualitydoc_net
    environment:
      PG_USER:     "${PG_USER:-qualitydoc}"
      PG_PASSWORD: "${PG_PASSWORD:-QualityDoc_PG_2026!}"
    ports:
      - "8080:80"
    depends_on:
      - postgres
      - search-service
      - qualitydoc-app

  # ── Aplicación .NET ───────────────────────────────────────────────────────────
  qualitydoc-app:
    build:
      context: ./QualityDocD
      dockerfile: Dockerfile
    container_name: qualitydoc_app
    restart: unless-stopped
    networks:
      - qualitydoc_net
    ports:
      - "5001:5000"
    environment:
      ConnectionStrings__SqlServer:  "Server=sqlserver,1433;Database=QualityDocDB;User Id=sa;Password=${SQLSERVER_SA_PASSWORD:-QualityDoc2026!};TrustServerCertificate=True;"
      ConnectionStrings__PostgreSQL: "Host=postgres;Port=5432;Database=${PG_DB:-qualitydoc_audit};Username=${PG_USER:-qualitydoc};Password=${PG_PASSWORD:-QualityDoc_PG_2026!};"
      MongoDB__Uri:                  "mongodb://${MONGO_USER:-mongoadmin}:${MONGO_PASSWORD:-QualityDoc_Mongo_2026!}@mongodb:27017"
      MongoDB__Database:             "${MONGO_DB:-qualitydoc_meta}"
      SearchService__BaseUrl:        "http://search-service:3001"
      NodeApi__Url:                  "http://node-api:5000"
      ApiAuth__JwtSecret:            "${SESSION_SECRET:-QualityDoc-JWT-Secret-Change-Me!}"
      ApiAuth__ExpirationHours:      "8"
      ASPNETCORE_URLS:               "http://+:5000"
    depends_on:
      sqlserver:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ── Node.js API ───────────────────────────────────────────────────────────────
  node-api:
    build:
      context: ./node-api
      dockerfile: Dockerfile
    container_name: qualitydoc_node_api
    restart: unless-stopped
    networks:
      - qualitydoc_net
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL:   "${NODE_API_DATABASE_URL:-postgresql://qualitydoc:QualityDoc_PG_2026!@postgres:5432/qualitydoc_audit}"
      SESSION_SECRET: "${SESSION_SECRET:-QualityDoc-JWT-Secret-Change-Me!}"
      NODE_API_PORT:  "5000"
    depends_on:
      postgres:
        condition: service_healthy

# ── Volúmenes persistentes ────────────────────────────────────────────────────
volumes:
  sqlserver_data:
    driver: local
    labels:
      project: "qualitydoc"
      db:      "sqlserver"
  postgres_data:
    driver: local
    labels:
      project: "qualitydoc"
      db:      "postgresql"
  mongodb_data:
    driver: local
    labels:
      project: "qualitydoc"
      db:      "mongodb"

# ── Red interna ───────────────────────────────────────────────────────────────
networks:
  qualitydoc_net:
    driver: bridge
    labels:
      project: "qualitydoc"
