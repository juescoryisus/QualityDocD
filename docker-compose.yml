services:
  # ── SQL Server 2022 ──────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: qualitydoc_sqlserver
    restart: unless-stopped
    networks:
      - qualitydoc_net
    environment:
      ACCEPT_EULA:       "Y"
      SA_PASSWORD:       "${SQLSERVER_SA_PASSWORD:-QualityDoc2026!}"
      MSSQL_PID:         "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${SQLSERVER_SA_PASSWORD:-QualityDoc2026!}' -Q 'SELECT 1' -No -C"]
      interval: 15s
      timeout:  10s
      retries:  8
      start_period: 30s

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: qualitydoc_postgres
    restart: unless-stopped
    networks:
      - qualitydoc_net
    environment:
      POSTGRES_DB:       "${PG_DB:-qualitydoc_audit}"
      POSTGRES_USER:     "${PG_USER:-qualitydoc}"
      POSTGRES_PASSWORD: "${PG_PASSWORD:-QualityDoc_PG_2026!}"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-qualitydoc} -d ${PG_DB:-qualitydoc_audit}"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 10s

  # ── MongoDB 7 ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: qualitydoc_mongodb
    restart: unless-stopped
    networks:
      - qualitydoc_net
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_USER:-mongoadmin}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_PASSWORD:-QualityDoc_Mongo_2026!}"
      MONGO_INITDB_DATABASE:      "${MONGO_DB:-qualitydoc_meta}"
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./db/mongodb/init.js:/docker-entrypoint-initdb.d/01_init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 15s
      timeout:  10s
      retries:  5
      start_period: 20s

  # ── Node.js Search Service ────────────────────────────────────────────────────
  search-service:
    build:
      context: ./search-service
      dockerfile: Dockerfile
    container_name: qualitydoc_search
    restart: unless-stopped
    networks:
      - qualitydoc_net
    environment:
      PORT:           "3001"
      MONGO_HOST:     "mongodb"
      MONGO_USER:     "${MONGO_USER:-mongoadmin}"
      MONGO_PASSWORD: "${MONGO_PASSWORD:-QualityDoc_Mongo_2026!}"
      MONGO_DB:       "${MONGO_DB:-qualitydoc_meta}"
    ports:
      - "3001:3001"
    depends_on:
      mongodb:
        condition: service_healthy

  # ── PHP Portal ───────────────────────────────────────────────────────────────
  php-portal:
    build:
      context: ./php-portal
      dockerfile: Dockerfile
    container_name: qualitydoc_php
    restart: unless-stopped
    networks:
      - qualitydoc_net
    ports:
      - "8080:80"
    depends_on:
      - postgres
      - search-service

# ── Volúmenes persistentes ────────────────────────────────────────────────────
volumes:
  sqlserver_data:
  postgres_data:
  mongodb_data:

# ── Redes ─────────────────────────────────────────────────────────────────────
networks:
  qualitydoc_net:
    driver: bridge